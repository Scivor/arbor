name: tests

on:
  push:
    branches: [main]
  pull_request:
  # nightly 金丝雀：依赖为 >= 宽松约束，上游发布破坏性版本时能次日发现
  schedule:
    - cron: "17 2 * * *"   # 每天 02:17 UTC
  workflow_dispatch:        # 允许手动触发

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Ruff lint (gate)
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        run: pytest tests/ -q
