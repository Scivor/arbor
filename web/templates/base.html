<!DOCTYPE html>
<html lang="{% if lang == 'en' %}en{% else %}zh-CN{% endif %}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Arbor{% endblock %}</title>
<link rel="stylesheet" href="/static/css/kami.css">
{% block extra_head %}{% endblock %}
</head>
<body>

<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="/" class="site-brand">Arbor</a>
    <div class="site-links">
      {% if lang == 'en' %}
      <a href="/?lang=en" {% if request.url.path == '/' %}class="active"{% endif %}>Latest Report</a>
      <a href="/reports/?lang=en" {% if request.url.path.startswith('/reports/') %}class="active"{% endif %}>Archive</a>
      <a href="{{ request.url.path }}">中文</a>
      {% else %}
      <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>最新报告</a>
      <a href="/reports/" {% if request.url.path.startswith('/reports/') %}class="active"{% endif %}>历史归档</a>
      <a href="{{ request.url.path }}?lang=en">EN</a>
      {% endif %}
    </div>
  </div>
</nav>

<main class="site-main">
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <p>{% if lang == 'en' %}Generated by Arbor · For internal reference only{% else %}Generated by Arbor · 数据仅供内部参考，不构成投资建议{% endif %}</p>
</footer>

</body>
</html>
